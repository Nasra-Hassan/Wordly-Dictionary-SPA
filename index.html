<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Wordly Dictionary</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Wordly Dictionary</h1>

  
  <form id="search-form">
    <input 
      type="text" 
      id="word-input" 
      placeholder="Search a word..." 
      aria-label="Search word"
    >
    <button type="submit">Search</button>
  </form>

  
  <div id="results">
    <h2 id="word-title"></h2>
    <p id="pronunciation"></p>
    <button id="audio-btn" style="display:none;">Play Audio</button>

    <h3>Definition</h3>
    <p id="definition"></p>

    <h3>Synonyms</h3>
    <ul id="synonyms"></ul>

    <div id="error-message"></div>
  </div>

  <script src="index.js"></script>
</body>
</html>
